<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AI 個人彩妝檢測系統 Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/dist/face-api.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #FFF7F9; height: 100vh; overflow: hidden; }
        
        .app { max-width: 420px; height: 100vh; margin: 0 auto; background: #fff; position: relative; display: flex; flex-direction: column; }
        
        /* 頂部導航 */
        .header { padding: 14px; background: #FF85A5; color: white; text-align: center; font-weight: bold; font-size: 16px; z-index: 10; }
        .loading-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #FF4A96; }

        /* 相機預覽區 */
        .camera-container { position: relative; width: 100%; height: 320px; background: #000; overflow: hidden; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        .guide-text { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); color: white; padding: 4px 12px; border-radius: 20px; font-size: 11px; white-space: nowrap; }

        /* 內容面板 */
        .content-panel { flex: 1; overflow-y: auto; padding: 15px; background: #fdfdfd; border-radius: 20px 20px 0 0; margin-top: -15px; z-index: 5; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); }
        
        .section-title { font-size: 15px; color: #FF4A96; margin: 15px 0 10px; display: flex; align-items: center; font-weight: bold; }
        .section-title::before { content: ""; width: 4px; height: 15px; background: #FF4A96; margin-right: 8px; border-radius: 2px; }

        .card { background: #fff; border: 1px solid #FFE4ED; border-radius: 12px; padding: 12px; margin-bottom: 12px; box-shadow: 0 2px 6px rgba(255,133,165,0.1); }
        
        /* 按鈕樣式 */
        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .mode-btn { padding: 8px 12px; border-radius: 8px; border: 1px solid #FFC2D7; background: #fff; color: #FF4A96; font-size: 12px; cursor: pointer; transition: 0.3s; }
        .mode-btn.active { background: #FF4A96; color: #fff; border-color: #FF4A96; }

        /* 檢測結果文字 */
        .result-item { font-size: 13px; color: #444; margin-bottom: 6px; display: flex; justify-content: space-between; }
        .badge { padding: 2px 8px; border-radius: 4px; background: #FF85A5; color: white; font-weight: bold; }
        .color-preview { width: 20px; height: 20px; border-radius: 50%; border: 1px solid #ddd; display: inline-block; vertical-align: middle; }

        /* 步驟列表 */
        .step-list { font-size: 13px; color: #666; line-height: 1.6; }
        .step-item { padding: 5px 0; border-bottom: 1px dashed #eee; }
    </style>
</head>
<body>

<div class="app">
    <div id="loading" class="loading-overlay">
        <p>AI 模型載入中...</p>
        <small>請稍候，初次載入約需 5-10 秒</small>
    </div>

    <div class="header">AI 個人彩妝檢測系統 Pro</div>

    <div class="camera-container">
        <video id="video" autoplay muted playsinline></video>
        <canvas id="canvas"></canvas>
        <div class="guide-text" id="guide">請將臉部對準畫面中央</div>
    </div>

    <div class="content-panel">
        <div class="section-title">🎓 AR 虛擬教學模式</div>
        <div class="btn-group" id="demo-modes">
            <button class="mode-btn active" data-style="none">原貌</button>
            <button class="mode-btn" data-style="clean">清透裸妝</button>
            <button class="mode-btn" data-style="date">甜美約會</button>
            <button class="mode-btn" data-style="office">職場通勤</button>
            <button class="mode-btn" data-style="party">高冷派對</button>
        </div>

        <div class="section-title">📊 AI 即時檢測分析</div>
        <div class="card">
            <div class="result-item">臉型判斷：<span id="res-face" class="badge">偵測中</span></div>
            <div class="result-item">膚色偵測：<span id="res-skin" class="badge">偵測中</span></div>
            <div class="result-item">建議色號：<div id="res-color-box" class="color-preview"></div></div>
            <p id="res-desc" style="font-size: 11px; color: #888; margin-top: 8px;"></p>
        </div>

        <div class="section-title">📝 妝容步驟教學</div>
        <div class="card">
            <div class="step-list" id="step-container">
                <div class="step-item">1. 等待 AI 分析您的臉型與膚色...</div>
            </div>
        </div>

        <div class="section-title">🧴 專屬美妝推薦</div>
        <div class="card" id="product-recommend" style="font-size: 13px; color: #555;">
            正在計算適合您的質地與產品...
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const loading = document.getElementById('loading');
    const guide = document.getElementById('guide');

    let currentStyle = 'none';
    let modelsLoaded = false;

    // 1. 妝容數據配置
    const styles = {
        none: { lip: 'transparent', blush: 'transparent', steps: ["保持素顏狀態進行膚質檢測"] },
        clean: { 
            lip: 'rgba(255, 140, 150, 0.3)', 
            blush: 'rgba(255, 192, 203, 0.15)', 
            steps: ["使用保濕妝前乳", "薄擦水光粉底", "珊瑚色口紅輕點唇腹", "刷出根根分明的睫毛"]
        },
        date: { 
            lip: 'rgba(255, 20, 147, 0.4)', 
            blush: 'rgba(255, 105, 180, 0.3)', 
            steps: ["加強眼周遮瑕", "使用蜜桃色腮紅圓形暈染", "塗抹玫瑰色水光唇釉", "加強臥蠶提亮"]
        },
        office: { 
            lip: 'rgba(180, 80, 80, 0.5)', 
            blush: 'rgba(200, 150, 120, 0.2)', 
            steps: ["使用霧面底妝", "畫出俐落的平直眉", "使用大地色眼影消腫", "疊加茶棕色口紅"]
        },
        party: { 
            lip: 'rgba(150, 0, 20, 0.6)', 
            blush: 'rgba(255, 90, 90, 0.2)', 
            steps: ["高遮瑕底妝與修容", "上揚的貓眼眼線", "飽和的大紅色唇膏", "顴骨上方加強打亮"]
        }
    };

    // 2. 初始化與載入模型
    async function init() {
        try {
            const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
            await Promise.all([
                faceApi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
                faceApi.nets.faceLandmark68Net.loadFromUri(MODEL_URL)
            ]);
            modelsLoaded = true;
            loading.style.display = 'none';
            startCamera();
        } catch (err) {
            alert("模型載入失敗，請檢查網路連線");
        }
    }

    // 3. 啟動相機
    async function startCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: 'user', width: 640, height: 480 } 
        });
        video.srcObject = stream;
        video.onloadedmetadata = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            detectLoop();
        };
    }

    // 4. 主偵測迴圈
    async function detectLoop() {
        if (!modelsLoaded) return;

        const detection = await faceApi.detectSingleFace(video).withFaceLandmarks();

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (detection) {
            guide.innerText = "✨ AI 偵測中";
            const landmarks = detection.landmarks;
            
            // AI 分析
            const faceShape = analyzeFace(landmarks);
            const skinTone = sampleSkinTone(landmarks);
            
            // 更新介面
            updateUI(faceShape, skinTone);

            // 繪製 AR 妝容
            if (currentStyle !== 'none') {
                drawAR(landmarks, styles[currentStyle]);
            }
        } else {
            guide.innerText = "請將臉部對準畫面中央";
        }

        requestAnimationFrame(detectLoop);
    }

    // 5. 臉型與膚色邏輯
    function analyzeFace(m) {
        const jaw = m.getJawOutline();
        const width = Math.abs(jaw[16].x - jaw[0].x);
        const height = Math.abs(jaw[8].y - m.getNose()[0].y);
        const ratio = width / height;

        if (ratio > 1.1) return { type: "方圓臉", desc: "輪廓感強，適合修飾兩側。建議：弧形眉、圓潤腮紅。" };
        if (ratio < 0.9) return { type: "長橢圓臉", desc: "臉部比例優雅，適合橫向橫掃腮紅。建議：平直眉。" };
        return { type: "標準鵝蛋臉", desc: "完美比例！適合各種妝風格，建議嘗試多樣化唇色。" };
    }

    function sampleSkinTone(m) {
        const noseTip = m.getNose()[6];
        // 從鼻尖取得顏色
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = video.videoWidth;
        tempCanvas.height = video.videoHeight;
        const tempCtx = tempCanvas.getContext('2d');
        tempCtx.drawImage(video, 0, 0);
        const pixel = tempCtx.getImageData(noseTip.x, noseTip.y, 1, 1).data;
        
        const r = pixel[0], g = pixel[1], b = pixel[2];
        const isWarm = (r > b + 10);
        return {
            type: isWarm ? "暖色調 (Warm)" : "冷色調 (Cool)",
            rgb: `rgb(${r},${g},${b})`,
            product: isWarm ? "建議使用珊瑚色系、金棕色產品" : "建議使用粉紫色系、銀灰色產品"
        };
    }

    // 6. 繪製 AR 妝容
    function drawAR(landmarks, config) {
        // 畫腮紅 (圓形)
        const jaw = landmarks.getJawOutline();
        ctx.fillStyle = config.blush;
        const leftCheek = jaw[3];
        const rightCheek = jaw[13];
        
        ctx.beginPath();
        ctx.arc(leftCheek.x + 15, leftCheek.y - 35, 30, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(rightCheek.x - 15, rightCheek.y - 35, 30, 0, Math.PI*2);
        ctx.fill();

        // 畫口紅 (多邊形)
        const mouth = landmarks.getMouth();
        ctx.fillStyle = config.lip;
        ctx.beginPath();
        mouth.forEach((p, i) => {
            if (i === 0) ctx.moveTo(p.x, p.y);
            else ctx.lineTo(p.x, p.y);
        });
        ctx.closePath();
        ctx.fill();
    }

    // 7. 更新 UI 內容
    function updateUI(face, skin) {
        document.getElementById('res-face').innerText = face.type;
        document.getElementById('res-skin').innerText = skin.type;
        document.getElementById('res-desc').innerText = face.desc;
        document.getElementById('res-color-box').style.background = skin.rgb;
        document.getElementById('product-recommend').innerText = `【AI 底妝建議】${skin.product}。您的肌膚適合清爽型底妝，T字部位建議加強定妝。`;
    }

    // 8. 模式切換事件
    document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentStyle = btn.dataset.style;
            
            // 更新教學步驟
            const container = document.getElementById('step-container');
            container.innerHTML = styles[currentStyle].steps
                .map((s, i) => `<div class="step-item">${i+1}. ${s}</div>`)
                .join('');
        };
    });

    init();
</script>

</body>
</html>
