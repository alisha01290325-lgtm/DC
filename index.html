<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI DC 智慧形象大師 V27 - 終極旗艦版</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --p: #d8b4fe; --txt: #333; --bg: #fdfbff; --card: #ffffff; --gray: #f2f2f7; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 0; overflow-x: hidden; }
        .app-container { max-width: 500px; margin: auto; min-height: 100vh; background: white; box-shadow: 0 0 30px rgba(0,0,0,0.05); }
        .page { display: none; padding: 20px; animation: fadeIn 0.4s ease; box-sizing: border-box; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* 相機與 AR 面網 */
        .v-frame { width: 95%; margin: 15px auto; border-radius: 40px; overflow: hidden; border: 8px solid white; box-shadow: 0 15px 40px rgba(0,0,0,0.08); position: relative; background: #000; }
        video { width: 100%; transform: scaleX(-1); display: block; border-radius: 32px; }
        canvas.overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

        /* 導航分頁 */
        .nav-tabs { display: flex; overflow-x: auto; gap: 10px; padding: 10px 0; scrollbar-width: none; margin-bottom: 15px; }
        .tab { flex: 0 0 auto; padding: 10px 20px; border-radius: 20px; background: var(--gray); border: none; font-size: 0.85em; font-weight: bold; color: #888; cursor: pointer; }
        .tab.active { background: var(--p); color: white; }

        /* 卡片元件 */
        .card { background: white; border-radius: 30px; padding: 22px; margin-bottom: 18px; border: 1px solid #f0f0f0; box-shadow: 0 10px 25px rgba(0,0,0,0.02); }
        .card h3 { font-size: 1.05em; display: flex; align-items: center; gap: 10px; margin-top: 0; color: var(--p); }

        /* 數據拉桿 (FaceTag) */
        .m-bar { height: 6px; background: #eee; border-radius: 10px; position: relative; margin: 12px 0; }
        .m-ptr { position: absolute; top: -5px; width: 16px; height: 16px; background: var(--p); border: 3px solid white; border-radius: 50%; transition: 0.8s; }

        /* 色盤視覺化 (酵色) */
        .color-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .swatch { aspect-ratio: 1; border-radius: 12px; border: 2px solid white; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        /* AR 控制鈕 */
        .ar-btn { background: white; border: 1px solid var(--p); color: var(--p); padding: 8px 15px; border-radius: 20px; font-size: 0.75em; font-weight: bold; cursor: pointer; }
        .ar-btn.active { background: var(--p); color: white; }

        /* 動態教學 SVG */
        .diag-svg { width: 100%; background: #fafafa; border-radius: 20px; margin: 15px 0; }
        .step-txt { border-left: 3px solid var(--p); padding-left: 12px; font-size: 0.88em; line-height: 1.6; margin: 10px 0; }

        .btn-main { width: 90%; height: 55px; background: var(--p); color: white; border-radius: 30px; border: none; font-weight: bold; font-size: 1.1em; cursor: pointer; display: block; margin: 20px auto; }
    </style>
</head>
<body>

<div class="app-container">

    <div id="p1" class="page active">
        <div style="text-align: center; margin-top: 20px;">
            <div style="color: var(--p); letter-spacing: 5px; font-size: 0.8em; font-weight: bold;">AESTHETIC AI MASTER</div>
            <h2 style="font-weight: 300; margin: 5px 0;">478 點位深度診斷</h2>
        </div>

        <div class="v-frame">
            <video id="v" autoplay playsinline></video>
            <canvas id="mesh-canvas" class="overlay"></canvas>
        </div>

        <div style="display:flex; justify-content:center; gap:10px; margin: 10px 0;">
            <button id="ar-lip" class="ar-btn" onclick="toggleAR('lip')"><i class="fa-solid fa-lips"></i> AR 試唇色</button>
            <button id="ar-blush" class="ar-btn" onclick="toggleAR('blush')"><i class="fa-solid fa-brush"></i> AR 修容引導</button>
        </div>

        <button class="btn-main" onclick="goToReport()">生成全方位美學報告</button>
    </div>

    <div id="p2" class="page">
        <div style="text-align: center; margin-bottom: 15px;">
            <div style="font-size: 2.2em; font-weight: bold; color: var(--p);">92</div>
            <h2 id="res-face">楕圓面 | 暖色調</h2>
            <p style="color: #bbb; font-size: 0.8em;">#新鮮型 | #比例均勻 | #2WG</p>
        </div>

        <div class="nav-tabs">
            <button class="tab active" onclick="showM('m-data')">📊 比例</button>
            <button class="tab" onclick="showM('m-color')">🎨 色彩</button>
            <button class="tab" onclick="showM('m-tut')">💄 妝容</button>
            <button class="tab" onclick="showM('m-skin')">🧖 皮膚</button>
        </div>

        <div id="m-data" class="module">
            <div class="card">
                <h3><i class="fa-solid fa-ruler-combined"></i> 三庭五眼數據儀表板</h3>
                <p style="font-size:0.75em; color:#888;">中庭比例佔比 (三庭)</p>
                <div class="m-bar"><div class="m-ptr" style="left: 62%;"></div></div>
                <p style="font-size:0.75em; color:#888; margin-top:15px;">眼間距佔比 (五眼)</p>
                <div class="m-bar"><div class="m-ptr" style="left: 75%;"></div></div>
            </div>
        </div>

        <div id="m-color" class="module" style="display:none;">
            <div class="card">
                <h3><i class="fa-solid fa-palette"></i> 適合您的「本命正紅」</h3>
                <div class="color-grid">
                    <div class="swatch" style="background: #b91c1c;" onclick="arColor('#b91c1c')"></div>
                    <div class="swatch" style="background: #ea580c;" onclick="arColor('#ea580c')"></div>
                    <div class="swatch" style="background: #9a3412;" onclick="arColor('#9a3412')"></div>
                    <div class="swatch" style="background: #7c2d12;" onclick="arColor('#7c2d12')"></div>
                </div>
                <p style="font-size:0.8em; color:#888; margin-top:10px;">點擊色塊，回到上方 AR 鏡即可實時試妝。</p>
            </div>
        </div>

        <div id="m-tut" class="module" style="display:none;">
            <div class="nav-tabs" style="background:none; border:none;">
                <button class="tab active" style="font-size:0.7em;" onclick="setS('elegant')">精緻氣質</button>
                <button class="tab" style="font-size:0.7em;" onclick="setS('kpop')">韓系水光</button>
                <button class="tab" style="font-size:0.7em;" onclick="setS('western')">歐美立體</button>
            </div>
            <div class="card">
                <div class="diag-svg">
                    <svg id="svg-tut" viewBox="0 0 100 60">
                        <path id="path-brow" d="M 35 25 Q 45 15 55 25" stroke="#444" fill="none" stroke-width="2" stroke-linecap="round"/>
                        <path id="path-shadow" d="M 32 35 Q 42 25 52 35" fill="#d4a373" opacity="0.4"/>
                        <text x="50" y="55" font-size="3" text-anchor="middle" fill="#ccc">動態變美施工地圖</text>
                    </svg>
                </div>
                <div id="tut-txt" class="step-txt"><b>眉毛：</b>對齊點位，畫出俐落挑眉。</div>
            </div>
        </div>

        <div id="m-skin" class="module" style="display:none;">
            <div class="card">
                <h3><i class="fa-solid fa-virus"></i> 皮膚科學分析雷達</h3>
                <canvas id="skinChart" style="max-width: 250px; margin: auto;"></canvas>
            </div>
        </div>

        <button class="btn-main" style="background:#eee; color:#666;" onclick="location.reload()">重新檢測</button>
    </div>

</div>

<script type="module">
    import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js";

    let faceL;
    let v = document.getElementById("v");
    let c = document.getElementById("mesh-canvas");
    let ctx = c.getContext("2d");
    let arState = { lip: false, blush: false, color: '#b91c1c' };

    async function init() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
        v.srcObject = stream;
        const fileset = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm");
        faceL = await FaceLandmarker.createFromOptions(fileset, {
            baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task`, delegate: "GPU" },
            runningMode: "VIDEO"
        });
        loop();
    }
    init();

    // 核心渲染：478點網格 + AR 試妝
    async function loop() {
        c.width = v.videoWidth; c.height = v.videoHeight;
        const res = await faceL.detectForVideo(v, performance.now());
        ctx.clearRect(0, 0, c.width, c.height);
        
        if (res.faceLandmarks && res.faceLandmarks[0]) {
            const lm = res.faceLandmarks[0];
            
            // 1. 478 點位微光面網 (極致專業感)
            ctx.fillStyle = "rgba(216, 180, 254, 0.4)";
            lm.forEach((p, i) => { if(i%2==0) ctx.fillRect(p.x * c.width, p.y * c.height, 1, 1); });

            // 2. AR 唇膏
            if (arState.lip) {
                const lipIdx = [61, 146, 91, 181, 84, 17, 314, 405, 321, 375, 291, 308, 324, 318, 402, 317, 14, 87, 178, 88, 95, 80, 191, 78, 62, 76];
                ctx.beginPath(); ctx.moveTo(lm[61].x*c.width, lm[61].y*c.height);
                lipIdx.forEach(i => ctx.lineTo(lm[i].x*c.width, lm[i].y*c.height));
                ctx.closePath(); ctx.fillStyle = arState.color + "77"; ctx.fill();
            }
            
            // 3. AR 腮紅
            if (arState.blush) {
                ctx.fillStyle = "rgba(216, 180, 254, 0.25)";
                ctx.beginPath(); ctx.arc(lm[234].x*c.width, lm[234].y*c.height, 25, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(lm[454].x*c.width, lm[454].y*c.height, 25, 0, Math.PI*2); ctx.fill();
            }
        }
        requestAnimationFrame(loop);
    }

    window.goToReport = () => {
        document.getElementById("p1").classList.remove("active");
        document.getElementById("p2").classList.add("active");
        initChart();
    };

    function initChart() {
        new Chart(document.getElementById('skinChart'), {
            type: 'radar',
            data: {
                labels: ['肌齡', '細膩', '控油', '勻淨', '耐受'],
                datasets: [{ data: [8, 9, 7, 8, 9], backgroundColor: 'rgba(216, 180, 254, 0.4)', borderColor: '#d8b4fe', pointRadius: 0 }]
            },
            options: { scales: { r: { min: 0, max: 10, ticks: { display: false } } }, plugins: { legend: { display: false } } }
        });
    }

    window.toggleAR = (t) => {
        arState[t] = !arState[t];
        document.getElementById(`ar-${t}`).classList.toggle('active');
    };

    window.arColor = (c) => {
        arState.color = c; arState.lip = true;
        document.getElementById('ar-lip').classList.add('active');
        document.getElementById("p2").classList.remove("active");
        document.getElementById("p1").classList.add("active");
    };

    window.showM = (id) => {
        document.querySelectorAll(".module").forEach(m => m.style.display = "none");
        document.querySelectorAll(".nav-tabs .tab").forEach(t => t.classList.remove("active"));
        document.getElementById(id).style.display = "block";
        event.currentTarget.classList.add("active");
    };
</script>
</body>
</html>
