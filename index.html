<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AI 個人彩妝檢測 Pro - 完整版</title>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/dist/face-api.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #FFF7F9; height: 100vh; overflow: hidden; }
        
        .app { max-width: 420px; height: 100vh; margin: 0 auto; background: #fff; position: relative; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        
        /* 狀態標籤 */
        .header { padding: 14px; background: #FF85A5; color: white; text-align: center; font-weight: bold; font-size: 16px; z-index: 10; }
        
        /* 載入遮罩 */
        #loading-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.95); z-index: 100; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #FF85A5; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 相機區 */
        .camera-container { position: relative; width: 100%; height: 320px; background: #222; overflow: hidden; }
        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; pointer-events: none; transform: scaleX(-1); }
        .guide-text { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.5); color: white; padding: 4px 12px; border-radius: 20px; font-size: 11px; white-space: nowrap; }

        /* 面板區 */
        .content-panel { flex: 1; overflow-y: auto; padding: 15px; background: #fff; border-radius: 20px 20px 0 0; margin-top: -15px; z-index: 5; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); }
        .section-title { font-size: 14px; color: #FF4A96; margin: 15px 0 10px; font-weight: bold; display: flex; align-items: center; }
        .section-title::before { content: ""; width: 4px; height: 14px; background: #FF4A96; margin-right: 8px; border-radius: 2px; }

        /* 按鈕風格 */
        .btn-group { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
        .mode-btn { padding: 7px 10px; border-radius: 8px; border: 1px solid #FFC2D7; background: #fff; color: #FF4A96; font-size: 12px; cursor: pointer; flex: 1; min-width: 80px; text-align: center; }
        .mode-btn.active { background: #FF4A96; color: #fff; border-color: #FF4A96; }

        /* 數據卡片 */
        .card { background: #FFF9FA; border-radius: 12px; padding: 12px; margin-bottom: 12px; border: 1px solid #FFE4ED; }
        .res-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; color: #333; }
        .badge { background: #FF85A5; color: white; padding: 2px 8px; border-radius: 4px; font-weight: bold; font-size: 11px; }
        .color-dot { width: 18px; height: 18px; border-radius: 50%; border: 1px solid #ddd; display: inline-block; vertical-align: middle; }

        /* 教學列表 */
        .step-item { font-size: 13px; color: #666; padding: 6px 0; border-bottom: 1px solid #FFF0F5; display: flex; align-items: flex-start; }
        .step-num { color: #FF4A96; font-weight: bold; margin-right: 8px; }

        /* 錯誤提示彈窗 */
        #error-msg { color: #d93025; font-size: 12px; margin-top: 10px; display: none; padding: 10px; background: #fce8e6; border-radius: 8px; }
    </style>
</head>
<body>

<div class="app">
    <div id="loading-overlay">
        <div class="spinner"></div>
        <p id="loading-status" style="color: #FF4A96; font-weight: bold;">正在載入 AI 美妝模型...</p>
        <p id="loading-detail" style="font-size: 12px; color: #888; margin-top: 8px;">初次開啟需下載數據，請保持網路連線</p>
        <div id="error-msg"></div>
        <button id="retry-btn" style="display:none; margin-top:15px; padding:8px 20px; background:#FF4A96; color:white; border:none; border-radius:5px;">重新載入</button>
    </div>

    <div class="header">AI 個人彩妝檢測系統 Pro</div>

    <div class="camera-container">
        <video id="video" autoplay muted playsinline></video>
        <canvas id="canvas"></canvas>
        <div class="guide-text" id="guide">請將臉部正對鏡頭</div>
    </div>

    <div class="content-panel">
        <div class="section-title">💄 虛擬試妝教學</div>
        <div class="btn-group">
            <button class="mode-btn active" data-s="none">素顏</button>
            <button class="mode-btn" data-s="clean">清透</button>
            <button class="mode-btn" data-s="date">約會</button>
            <button class="mode-btn" data-s="office">職場</button>
            <button class="mode-btn" data-s="party">派對</button>
        </div>

        <div class="section-title">📊 智能檢測報告</div>
        <div class="card">
            <div class="res-row">臉型分析：<span id="face-type" class="badge">偵測中...</span></div>
            <div class="res-row">肌膚基調：<span id="skin-tone" class="badge">偵測中...</span></div>
            <div class="res-row">建議粉底色號：<div id="color-dot" class="color-dot"></div></div>
            <p id="face-advice" style="font-size: 11px; color: #888; line-height: 1.4; margin-top: 5px;"></p>
        </div>

        <div class="section-title">📝 專屬畫妝步驟</div>
        <div id="steps-box" class="card" style="padding: 5px 12px;">
            </div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusText = document.getElementById('loading-status');
    const errorMsg = document.getElementById('error-msg');
    const retryBtn = document.getElementById('retry-btn');

    let currentStyle = 'none';
    let isProcessing = false;

    // 妝容資料庫
    const makeupData = {
        none: { lip: 'transparent', blush: 'transparent', steps: ["保持素顏進行精準膚質與臉型分析"] },
        clean: { lip: 'rgba(255, 150, 160, 0.35)', blush: 'rgba(255, 192, 203, 0.2)', steps: ["隔離霜均勻膚色", "局部遮瑕取代厚重粉底", "透明眉膠梳理毛流", "珊瑚粉潤唇膏"] },
        date: { lip: 'rgba(240, 50, 120, 0.45)', blush: 'rgba(255, 140, 160, 0.35)', steps: ["水光感底妝", "眼下腮紅營造害羞感", "臥蠶處打亮", "玫瑰色唇釉疊擦"] },
        office: { lip: 'rgba(160, 70, 70, 0.55)', blush: 'rgba(210, 160, 130, 0.25)', steps: ["柔霧面底妝", "俐落平眉增加專業感", "大地色眼影消腫", "低飽和豆沙色口紅"] },
        party: { lip: 'rgba(140, 0, 10, 0.7)', blush: 'rgba(255, 80, 80, 0.3)', steps: ["全覆蓋粉底與深刻修容", "上揚貓眼眼線", "烈焰紅唇", "眼窩亮片點綴"] }
    };

    // 1. 初始化模型
    async function initAI() {
        try {
            // 使用 CDN 模型
            const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
            
            statusText.innerText = "正在載入辨識模型...";
            await Promise.all([
                faceApi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
                faceApi.nets.faceLandmark68Net.loadFromUri(MODEL_URL)
            ]);

            statusText.innerText = "正在啟動相機...";
            await startCamera();
            
            document.getElementById('loading-overlay').style.display = 'none';
            updateSteps('none');
            detectLoop();

        } catch (err) {
            console.error(err);
            errorMsg.style.display = 'block';
            errorMsg.innerHTML = "<b>啟動失敗：</b><br>" + err.message + "<br><br>請確保已授權相機權限，並建議使用 Safari 或 Chrome 開啟。";
            retryBtn.style.display = 'block';
        }
    }

    // 2. 相機啟動
    async function startCamera() {
        const constraints = { 
            video: { 
                facingMode: 'user', 
                width: { ideal: 640 }, 
                height: { ideal: 480 } 
            } 
        };
        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = stream;
        
        return new Promise((resolve) => {
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                resolve();
            };
        });
    }

    // 3. 循環偵測
    async function detectLoop() {
        if (video.paused || video.ended) return;

        // 減少偵測頻率以提升行動端效能
        const detection = await faceApi.detectSingleFace(video).withFaceLandmarks();

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (detection) {
            const landmarks = detection.landmarks;
            
            // 執行分析
            analyzeFaceShape(landmarks);
            analyzeSkinTone(landmarks);
            
            // 繪製 AR 妝容
            if (currentStyle !== 'none') {
                drawMakeup(landmarks, makeupData[currentStyle]);
            }
        }

        requestAnimationFrame(detectLoop);
    }

    // 4. 臉型分析
    function analyzeFaceShape(l) {
        const jaw = l.getJawOutline();
        const width = Math.abs(jaw[16].x - jaw[0].x);
        const height = Math.abs(jaw[8].y - l.getNose()[0].y);
        const ratio = width / height;

        let type = "標準臉";
        let advice = "您的臉型比例非常勻稱，適合任何妝容！";

        if (ratio > 1.18) {
            type = "方圓臉";
            advice = "建議加強兩側修容，腮紅可斜向刷至太陽穴。";
        } else if (ratio < 0.9) {
            type = "長臉型";
            advice = "建議縮短中庭，腮紅可橫向水平刷在蘋果肌。";
        }

        document.getElementById('face-type').innerText = type;
        document.getElementById('face-advice').innerText = advice;
    }

    // 5. 膚色採樣
    function analyzeSkinTone(l) {
        const nose = l.getNose()[6];
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = video.videoWidth;
        tempCanvas.height = video.videoHeight;
        const tCtx = tempCanvas.getContext('2d');
        tCtx.drawImage(video, 0, 0);
        
        const pixel = tCtx.getImageData(nose.x, nose.y, 1, 1).data;
        const r = pixel[0], g = pixel[1], b = pixel[2];
        
        const isWarm = (r > b + 15);
        document.getElementById('skin-tone').innerText = isWarm ? "暖色調 (Warm)" : "冷色調 (Cool)";
        document.getElementById('color-dot').style.background = `rgb(${r},${g},${b})`;
    }

    // 6. 繪製 AR
    function drawMakeup(l, cfg) {
        // 腮紅
        const jaw = l.getJawOutline();
        ctx.fillStyle = cfg.blush;
        // 左頰
        ctx.beginPath();
        ctx.arc(jaw[3].x + 10, jaw[3].y - 35, 35, 0, Math.PI * 2);
        ctx.fill();
        // 右頰
        ctx.beginPath();
        ctx.arc(jaw[13].x - 10, jaw[13].y - 35, 35, 0, Math.PI * 2);
        ctx.fill();

        // 口紅
        const mouth = l.getMouth();
        ctx.fillStyle = cfg.lip;
        ctx.beginPath();
        mouth.slice(0, 12).forEach((p, i) => {
            if (i === 0) ctx.moveTo(p.x, p.y);
            else ctx.lineTo(p.x, p.y);
        });
        ctx.closePath();
        ctx.fill();
    }

    // 7. 更新步驟介面
    function updateSteps(styleKey) {
        const container = document.getElementById('steps-box');
        container.innerHTML = makeupData[styleKey].steps
            .map((s, i) => `<div class="step-item"><span class="step-num">${i+1}</span>${s}</div>`)
            .join('');
    }

    // 事件監聽
    document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentStyle = btn.dataset.s;
            updateSteps(currentStyle);
        });
    });

    retryBtn.onclick = () => location.reload();

    // 啟動程式
    window.onload = initAI;
</script>

</body>
</html>
