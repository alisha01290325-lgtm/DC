<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI DC 智慧美學全能大師 V32</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --p: #d8b4fe; --txt: #333; --bg: #fdfbff; --card: #ffffff; --gray: #f2f2f7; --neon: #d8b4fe; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 0; overflow-x: hidden; }
        .app-container { max-width: 500px; margin: auto; min-height: 100vh; background: white; position: relative; box-shadow: 0 0 30px rgba(0,0,0,0.05); }
        
        /* 頁面動畫 */
        .page { display: none; padding: 20px; animation: fadeIn 0.4s ease; box-sizing: border-box; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        /* 拍攝與 AR 區域 */
        .v-frame { width: 92%; margin: 20px auto; border-radius: 45px; overflow: hidden; border: 8px solid white; box-shadow: 0 15px 45px rgba(0,0,0,0.1); position: relative; background: #000; }
        video { width: 100%; transform: scaleX(-1); display: block; border-radius: 35px; }
        canvas.overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

        /* 導航分頁 */
        .nav-tabs { display: flex; overflow-x: auto; gap: 10px; padding: 10px 0; scrollbar-width: none; margin-bottom: 20px; }
        .tab { flex: 0 0 auto; padding: 10px 22px; border-radius: 20px; background: var(--gray); border: none; font-size: 0.85em; font-weight: bold; color: #888; cursor: pointer; transition: 0.3s; }
        .tab.active { background: var(--p); color: white; box-shadow: 0 5px 15px rgba(216, 180, 254, 0.4); }

        /* 性別切換專用樣式 */
        .gender-box { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .gender-btn { width: 130px; padding: 12px; border-radius: 25px; border: 2px solid #eee; background: white; color: #aaa; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .gender-btn.active { border-color: var(--p); color: var(--p); background: var(--acc); }

        .card { background: white; border-radius: 30px; padding: 25px; margin-bottom: 20px; border: 1px solid #f0f0f0; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        
        /* 比例數據尺 (FaceTag) */
        .m-bar { height: 6px; background: #eee; border-radius: 10px; position: relative; margin: 15px 0; }
        .m-ptr { position: absolute; top: -5px; width: 16px; height: 16px; background: var(--p); border: 3px solid white; border-radius: 50%; transform: translateX(-50%); transition: 0.8s; }

        /* 色彩網格 */
        .color-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 15px 0; }
        .swatch { aspect-ratio: 1; border-radius: 12px; border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        /* 風格教學 SVG */
        .diag-svg { width: 100%; background: #fafafa; border-radius: 20px; margin: 15px 0; padding: 10px; box-sizing: border-box; }
        .step-txt { border-left: 3px solid var(--p); padding-left: 15px; margin: 12px 0; font-size: 0.9em; line-height: 1.6; color: #555; }

        .btn-main { width: 85%; height: 55px; background: var(--p); color: white; border-radius: 30px; border: none; font-weight: bold; font-size: 1.1em; cursor: pointer; display: block; margin: 25px auto; box-shadow: 0 10px 20px rgba(216, 180, 254, 0.3); }
    </style>
</head>
<body>

<div class="app-container">

    <div id="p1" class="page active">
        <div style="text-align: center; margin-top: 30px;">
            <div style="color: var(--p); letter-spacing: 5px; font-size: 0.9em; font-weight: bold;">AESTHETIC AI FLAGSHIP</div>
            <h1 style="font-weight: 300; margin: 10px 0;">3D 臉部數據掃描</h1>
        </div>
        
        <div class="v-frame">
            <video id="v" autoplay playsinline></video>
            <canvas id="mesh-canvas" class="overlay"></canvas>
        </div>

        <div class="gender-box">
            <button id="btn-f" class="gender-btn active" onclick="setGender('f')"><i class="fa-solid fa-venus"></i> 女士美學</button>
            <button id="btn-m" class="gender-btn" onclick="setGender('m')"><i class="fa-solid fa-mars"></i> 男士理容</button>
        </div>

        <button class="btn-main" onclick="runAI()">開始深度美學診斷</button>
    </div>

    <div id="p2" class="page">
        <div style="text-align: center; margin-bottom: 20px;">
            <div style="font-size: 2.5em; font-weight: bold; color: var(--p);">92</div>
            <h2 id="res-face">橢圓面 | 暖色調</h2>
            <div style="color: #bbb; font-size: 0.85em;">#2WG | #暖春型 | #比例均勻</div>
        </div>

        <div class="nav-tabs">
            <button class="tab active" onclick="showM('mod-data')">📊 比例數據</button>
            <button class="tab" onclick="showM('mod-color')">🎨 本命色彩</button>
            <button class="tab" onclick="showM('mod-tut')">💄 風格妝教</button>
            <button class="tab" onclick="showM('mod-skin')">🧖 皮膚分析</button>
        </div>

        <div id="mod-data" class="module">
            <div class="card">
                <h3><i class="fa-solid fa-ruler-combined"></i> 三庭五眼數據偵測</h3>
                <p style="font-size:0.8em; color:#888;">中庭長度比例</p>
                <div class="m-bar"><div class="m-ptr" style="left: 65%;"></div></div>
                <p style="font-size:0.8em; color:#888; margin-top:20px;">眼間距數據 (五眼比)</p>
                <div class="m-bar"><div class="m-ptr" style="left: 75%;"></div></div>
            </div>
        </div>

        <div id="mod-color" class="module" style="display:none;">
            <div class="card">
                <h3><i class="fa-solid fa-palette"></i> 適合您的「正紅」與本命色</h3>
                <p style="font-size: 0.8em; color: #888;">AI 底色 ID: 2WG。左一為您的「命定正紅」：</p>
                <div class="color-grid">
                    <div class="swatch" style="background: #b91c1c;"></div> <div class="swatch" style="background: #ea580c;"></div>
                    <div class="swatch" style="background: #faedcd;"></div>
                    <div class="swatch" style="background: #b39ddb;"></div>
                </div>
            </div>
        </div>

        <div id="mod-tut" class="module" style="display:none;">
            <div class="nav-tabs" style="background:none; border:none; padding:0;">
                <button class="tab active" style="padding:8px 15px; font-size:0.75em;" onclick="setS('elegant')">氣質</button>
                <button class="tab" style="padding:8px 15px; font-size:0.75em;" onclick="setS('kpop')">水光</button>
                <button class="tab" style="padding:8px 15px; font-size:0.75em;" onclick="setS('western')">歐美</button>
            </div>
            <div class="card">
                <h3 id="tut-title">精緻氣質妝教學</h3>
                <div class="diag-svg">
                    <svg viewBox="0 0 100 65">
                        <ellipse cx="50" cy="30" rx="30" ry="25" fill="#fcf8ff" stroke="#eee" stroke-width="0.3"/>
                        <path id="path-brow" d="M 35 25 Q 45 15 55 25" stroke="#444" fill="none" stroke-width="2.5" stroke-linecap="round"/>
                        <path id="path-shadow" d="M 32 35 Q 42 25 52 35" fill="#d4a373" opacity="0.4"/>
                        <circle cx="35" cy="25" r="1.5" fill="var(--p)"/><circle cx="55" cy="25" r="1.5" fill="var(--p)"/>
                    </svg>
                </div>
                <div id="tut-txt" class="step-txt">畫出俐落挑眉，修容向內收縮。</div>
            </div>
        </div>

        <div id="mod-skin" class="module" style="display:none;">
            <div class="card">
                <h3><i class="fa-solid fa-virus"></i> 皮膚分析</h3>
                <div style="width: 220px; margin: auto;"><canvas id="skinChart"></canvas></div>
            </div>
        </div>

        <button class="btn-main" style="background:#eee; color:#666;" onclick="location.reload()">重新檢測</button>
    </div>

</div>

<script type="module">
    import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js";

    let faceL;
    const v = document.getElementById("v");
    const c = document.getElementById("mesh-canvas");
    const ctx = c.getContext("2d");

    const STYLE_DATA = {
        elegant: { title: "精緻氣質妝教學", brow: "M 35 25 Q 45 15 55 25", shadow: "#d4a373", txt: "畫出俐落挑眉，增加面部稜角。" },
        kpop: { title: "韓系水光妝教學", brow: "M 35 25 Q 45 25 55 25", shadow: "#fbcfe8", txt: "平直眉毛，強調臥蠶提亮。" },
        western: { title: "歐美立體妝教學", brow: "M 35 20 Q 45 5 55 20", shadow: "#a16207", txt: "挑高眉峰，強化深邃輪廓。" }
    };

    async function init() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
        v.srcObject = stream;
        const fileset = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm");
        faceL = await FaceLandmarker.createFromOptions(fileset, {
            baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task`, delegate: "GPU" },
            runningMode: "VIDEO"
        });
        loop();
    }
    init();

    // 478 點位微光網格繪製
    async function loop() {
        c.width = v.videoWidth; c.height = v.videoHeight;
        const res = await faceL.detectForVideo(v, performance.now());
        ctx.clearRect(0, 0, c.width, c.height);

        if (res.faceLandmarks && res.faceLandmarks[0]) {
            const points = res.faceLandmarks[0];
            ctx.fillStyle = "#d8b4fe";
            ctx.shadowColor = "#d8b4fe"; ctx.shadowBlur = 12; // 加強發光
            
            points.forEach((p, i) => {
                if(i % 2 === 0) {
                    ctx.beginPath(); ctx.arc(p.x * c.width, p.y * c.height, 2, 0, 2 * Math.PI); ctx.fill();
                }
            });

            ctx.shadowBlur = 0; ctx.strokeStyle = "rgba(216, 180, 254, 0.2)";
            for (let i = 0; i < points.length; i+=15) {
                if(points[i+1]) {
                    ctx.beginPath(); ctx.moveTo(points[i].x * c.width, points[i].y * c.height);
                    ctx.lineTo(points[i+1].x * c.width, points[i+1].y * c.height); ctx.stroke();
                }
            }
        }
        requestAnimationFrame(loop);
    }

    window.setGender = (g) => {
        document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(g==='f'?'btn-f':'btn-m').classList.add('active');
        document.documentElement.style.setProperty('--p', g==='m' ? '#818cf8' : '#d8b4fe');
    };

    window.runAI = () => {
        document.getElementById("p1").classList.remove("active");
        document.getElementById("p2").classList.add("active");
        initChart();
    };

    function initChart() {
        const ctxS = document.getElementById('skinChart').getContext('2d');
        new Chart(ctxS, {
            type: 'radar',
            data: {
                labels: ['健康度', '細膩度', '勻淨度', '耐受性', '年輕度'],
                datasets: [{ data: [7, 9, 6, 8, 9], backgroundColor: 'rgba(216,180,254,0.4)', borderColor: '#d8b4fe' }]
            },
            options: { plugins: { legend: { display: false } } }
        });
    }

    window.showM = (id) => {
        document.querySelectorAll(".module").forEach(m => m.style.display = "none");
        document.querySelectorAll(".nav-tabs .tab").forEach(t => t.classList.remove("active"));
        document.getElementById(id).style.display = "block";
        event.currentTarget.classList.add("active");
    };

    window.setS = (s) => {
        const d = STYLE_DATA[s] || STYLE_DATA.elegant;
        document.getElementById("tut-title").innerText = d.title;
        document.getElementById("path-brow").setAttribute("d", d.brow);
        document.getElementById("path-shadow").setAttribute("fill", d.shadow);
        document.getElementById("tut-txt").innerHTML = d.txt;
        document.querySelectorAll('#mod-tut .tab').forEach(t => t.classList.remove('active'));
        event.currentTarget.classList.add('active');
    };
</script>
</body>
</html>
