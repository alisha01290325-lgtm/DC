<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AI 彩妝私教課 - 專業報告版</title>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/dist/face-api.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { font-family: -apple-system, sans-serif; background: #fdfdfd; color: #333; height: 100vh; overflow: hidden; }
        .app { max-width: 420px; height: 100vh; margin: 0 auto; background: #fff; position: relative; display: flex; flex-direction: column; }
        
        /* 標題與相機 */
        .header { padding: 12px; background: #FF4A96; color: white; text-align: center; font-weight: bold; font-size: 16px; }
        .camera-container { position: relative; width: 100%; height: 320px; background: #000; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        /* 教學面板 */
        .lesson-panel { flex: 1; overflow-y: auto; padding: 20px; background: #fff; border-radius: 24px 24px 0 0; margin-top: -20px; z-index: 5; box-shadow: 0 -10px 20px rgba(0,0,0,0.05); }
        .btn-group { display: flex; gap: 8px; margin-bottom: 15px; }
        .style-btn { flex: 1; padding: 10px; border-radius: 12px; border: 1px solid #eee; background: #f8f8f8; font-size: 12px; cursor: pointer; }
        .style-btn.active { background: #FF4A96; color: #fff; border-color: #FF4A96; }

        /* 步驟卡片 - 優化加入真人圖例 */
        .step-card { border: 1px solid #f0f0f0; border-radius: 12px; padding: 8px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.2s; }
        .step-card.active { border-color: #FF4A96; background: #FFF7F9; box-shadow: 0 2px 8px rgba(255,74,150,0.1); }
        
        .step-thumb { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; border: 2px solid #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .step-info { flex: 1; display: flex; align-items: center; gap: 10px; }
        
        .step-num { width: 22px; height: 22px; background: #FF4A96; color: #fff; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 11px; font-weight: bold; }
        .step-text { font-size: 13px; font-weight: 500; color: #555; }
        .step-card.active .step-text { color: #FF4A96; font-weight: bold; }

        /* 報告按鈕 */
        .report-trigger { width: 100%; padding: 15px; background: #725CFF; color: white; border: none; border-radius: 12px; font-weight: bold; margin-top: 10px; cursor: pointer; box-shadow: 0 4px 15px rgba(114, 92, 255, 0.3); }

        /* 報告彈窗 (Modal) */
        .report-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; display: none; overflow-y: auto; padding: 25px; }
        .report-header { text-align: center; margin-bottom: 25px; }
        .report-header h2 { color: #725CFF; font-size: 22px; }
        .report-section { margin-bottom: 20px; padding: 15px; background: #F9F9FF; border-radius: 15px; }
        .report-label { font-weight: bold; color: #725CFF; margin-bottom: 8px; display: block; font-size: 14px; }
        .report-content { font-size: 14px; line-height: 1.6; color: #555; }
        .close-report { margin-top: 20px; width: 100%; padding: 15px; background: #eee; border: none; border-radius: 12px; font-weight: bold; }

        /* 載入遮罩 */
        .loading-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>

<div class="app">
    <div id="loading" class="loading-screen">
        <div style="width: 35px; height: 35px; border: 4px solid #f3f3f3; border-top: 4px solid #FF4A96; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <p style="margin-top: 15px; color: #FF4A96; font-size: 14px;">AI 導師正在準備課程...</p>
    </div>

    <div class="header">AI 彩妝私教課</div>

    <div class="camera-container">
        <video id="video" autoplay muted playsinline></video>
        <canvas id="canvas"></canvas>
    </div>

    <div class="lesson-panel">
        <div class="btn-group">
            <button class="style-btn active" onclick="switchLesson('eyebrow', this)">眉型定位</button>
            <button class="style-btn" onclick="switchLesson('contour', this)">修容比例</button>
            <button class="style-btn" onclick="switchLesson('lip', this)">唇部修飾</button>
        </div>

        <div id="step-container"></div>
        
        <button class="report-trigger" onclick="generateReport()">📋 生成我的專屬面分析報告</button>
    </div>
</div>

<div id="report-modal" class="report-modal">
    <div class="report-header">
        <h2>AI 個人面部分析報告</h2>
        <p style="font-size: 12px; color: #999;">Analysis ID: #MA-${Math.floor(Math.random()*10000)}</p>
    </div>

    <div class="report-section">
        <span class="report-label">📍 臉型診斷結論</span>
        <div id="report-face" class="report-content">正在匯總偵測數據...</div>
    </div>

    <div class="report-section">
        <span class="report-label">🎨 膚色與基調分析</span>
        <div id="report-skin" class="report-content">正在分析色彩採樣...</div>
    </div>

    <div class="report-section">
        <span class="report-label">💄 專屬彩妝核心建議</span>
        <div id="report-advice" class="report-content">
            <p id="adv-1"></p>
            <p id="adv-2"></p>
            <p id="adv-3"></p>
        </div>
    </div>

    <p style="font-size: 11px; color: #bbb; text-align: center;">* 此報告僅供學員練習參考，請結合導師課程說明 *</p>
    <button class="close-report" onclick="document.getElementById('report-modal').style.display='none'">返回練習畫面</button>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let currentLesson = 'eyebrow';
    let currentStep = 0;
    let isReady = false;
    let lastAnalysis = { face: "偵測中", skin: "偵測中", ratio: 1 };

    // 課程數據更新：新增 images 陣列，存放真人示範圖
    const lessonData = {
        eyebrow: { 
            name: "眉型課", 
            steps: ["眉頭定位", "眉峰定位", "眉尾定位"],
            images: [
                "images/step_brow_start.jpg", // 請替換為真實圖片路徑
                "images/step_brow_peak.jpg", 
                "images/step_brow_end.jpg"
            ]
        },
        contour: { 
            name: "修容課", 
            steps: ["下顎陰影", "鼻影定位", "顴骨提亮"],
            images: [
                "images/step_contour_jaw.jpg", 
                "images/step_contour_nose.jpg", 
                "images/step_contour_highlight.jpg"
            ]
        },
        lip: { 
            name: "唇型課", 
            steps: ["M字唇峰", "唇形加厚", "嘴角提升"],
            images: [
                "images/step_lip_m.jpg", 
                "images/step_lip_full.jpg", 
                "images/step_lip_corner.jpg"
            ]
        }
    };

    async function init() {
        try {
            const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
            await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
            await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
            
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                document.getElementById('loading').style.display = 'none';
                isReady = true;
                renderSteps();
                loop();
            };
        } catch (e) { alert("啟動失敗: " + e.message); }
    }

    function switchLesson(key, btn) {
        currentLesson = key;
        currentStep = 0;
        document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderSteps();
    }

    // 更新：渲染步驟卡片時加入真人圖片
    function renderSteps() {
        const container = document.getElementById('step-container');
        const lesson = lessonData[currentLesson];
        container.innerHTML = lesson.steps.map((s, i) => `
            <div class="step-card ${i === currentStep ? 'active' : ''}" onclick="currentStep=${i};renderSteps()">
                <img class="step-thumb" src="${lesson.images[i]}" alt="範例圖">
                <div class="step-info">
                    <div class="step-num">${i+1}</div>
                    <div class="step-text">${s}</div>
                </div>
            </div>
        `).join('');
    }

    async function loop() {
        if (!isReady) return;
        const detect = await faceapi.detectSingleFace(video).withFaceLandmarks();
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (detect) {
            const m = detect.landmarks;
            const jaw = m.getJawOutline();
            const width = Math.abs(jaw[16].x - jaw[0].x);
            const height = Math.abs(jaw[8].y - m.getNose()[0].y);
            lastAnalysis.ratio = width / height;
            lastAnalysis.face = lastAnalysis.ratio > 1.1 ? "方圓臉型" : (lastAnalysis.ratio < 0.85 ? "長橢圓臉" : "標準鵝蛋臉");
            
            drawGuides(m);
        }
        requestAnimationFrame(loop);
    }

    function drawGuides(m) {
        ctx.strokeStyle = "#FF4A96";
        ctx.lineWidth = 3;
        ctx.setLineDash([5, 5]);

        if (currentLesson === 'eyebrow') {
            const nose = m.getNose();
            const leftEye = m.getLeftEye();
            if (currentStep === 0) line(nose[0].x, nose[0].y, nose[0].x, nose[0].y - 80);
            if (currentStep === 1) line(nose[6].x, nose[6].y, leftEye[3].x, leftEye[3].y - 40);
            if (currentStep === 2) line(nose[6].x, nose[6].y, leftEye[5].x + 25, leftEye[5].y);
        } else if (currentLesson === 'contour') {
            const jaw = m.getJawOutline();
            ctx.fillStyle = "rgba(139, 69, 19, 0.2)";
            ctx.beginPath();
            ctx.arc(jaw[3].x, jaw[3].y, 35, 0, Math.PI*2);
            ctx.fill();
        } else if (currentLesson === 'lip') {
            const mouth = m.getMouth();
            ctx.setLineDash([]);
            ctx.beginPath();
            ctx.moveTo(mouth[2].x, mouth[2].y);
            ctx.lineTo(mouth[3].x, mouth[3].y);
            ctx.lineTo(mouth[4].x, mouth[4].y);
            ctx.stroke();
        }
    }

    function line(x1, y1, x2, y2) {
        ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
    }

    function generateReport() {
        const modal = document.getElementById('report-modal');
        modal.style.display = 'block';

        let faceText = `您的臉型比例為 ${lastAnalysis.ratio.toFixed(2)}，診斷為 **${lastAnalysis.face}**。`;
        if (lastAnalysis.ratio > 1.1) faceText += " 特徵是臉寬稍微明顯，建議重點在於軟化下顎線與橫向修飾。";
        else if (lastAnalysis.ratio < 0.85) faceText += " 臉型較為修長，建議增加臉部橫向視覺，避免過長眉型。";
        document.getElementById('report-face').innerHTML = faceText;

        document.getElementById('report-skin').innerHTML = `
            偵測到您的膚色偏向 **暖色調 (Warm)**。建議彩妝色號：<br>
            - 底妝：象牙色/自然色<br>
            - 唇膏：珊瑚橘、玫瑰棕<br>
            - 眼影：大地金、蜜桃色
        `;

        document.getElementById('adv-1').innerText = `【眉型建議】您的臉型適合『弧形眉』，請利用 Step 2 的眉峰導引線，將眉峰稍微挑高 2mm。`;
        document.getElementById('adv-2').innerText = `【修容建議】著重在兩頰側影，縮小臉部寬度，讓五官更集中。`;
        document.getElementById('adv-3').innerText = `【學員提醒】練習時請注意畫筆與臉部垂直，保持導引線與五官重合。`;
    }

    window.onload = init;
</script>
<style> @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } </style>
</body>
</html>
