<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AI 形象美學私教引導系統</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm/vision_bundle.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker/face_landmarker.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* --- 清新柔和美學樣式 --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { font-family: -apple-system, "PingFang TC", "Noto Sans TC", sans-serif; background: #F8F9FA; color: #444; height: 100vh; overflow: hidden; }
        
        .app { max-width: 420px; height: 100vh; margin: 0 auto; background: #FFF; position: relative; display: flex; flex-direction: column; box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
        
        /* 頂部：柔和粉白漸層 */
        .header { padding: 18px; background: linear-gradient(to right, #FFEDF1, #FFF); color: #FF85A5; text-align: center; font-weight: 700; font-size: 17px; letter-spacing: 1px; border-bottom: 1px solid #FFEDF1; }

        /* 相機預覽區 */
        .camera-container { position: relative; width: 100%; height: 350px; background: #F0F0F0; overflow: hidden; }
        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); pointer-events: none; }
        
        /* 三庭五眼數據：半透明磨砂感 */
        .proportion-overlay { position: absolute; top: 15px; left: 15px; background: rgba(255, 255, 255, 0.7); padding: 10px 15px; border-radius: 15px; font-size: 11px; color: #FF85A5; border: 1px solid rgba(255, 255, 255, 0.5); backdrop-filter: blur(10px); line-height: 1.6; font-weight: 500; }

        /* 教學面板 */
        .lesson-panel { flex: 1; overflow-y: auto; padding: 25px 20px; background: #FFF; border-radius: 35px 35px 0 0; margin-top: -35px; z-index: 5; }
        .section-title { font-size: 12px; color: #BDC3C7; margin-bottom: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        
        /* 風格切換：膠囊按鈕樣式 */
        .style-group { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .style-group::-webkit-scrollbar { display: none; }
        .style-btn { padding: 8px 18px; border-radius: 20px; border: 1.5px solid #F1F1F1; background: #FFF; font-size: 13px; font-weight: 600; white-space: nowrap; transition: 0.3s; color: #7F8C8D; cursor: pointer; }
        .style-btn.active { background: #FF85A5; color: #FFF; border-color: #FF85A5; box-shadow: 0 4px 15px rgba(255, 133, 165, 0.2); }

        /* 步驟卡片 */
        .step-card { border: 1px solid #F1F1F1; border-radius: 18px; padding: 12px; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; gap: 15px; transition: 0.2s; background: #FAFAFA; }
        .step-card.active { border-color: #FF85A5; background: #FFF; box-shadow: 0 5px 15px rgba(0,0,0,0.03); }
        .step-thumb { width: 52px; height: 52px; border-radius: 14px; object-fit: cover; background: #FFF0F5; border: 2px solid #FFF; }
        .step-text { font-size: 14px; font-weight: 500; color: #555; flex: 1; }

        .report-trigger { width: 100%; padding: 16px; background: #FF85A5; color: #FFF; border: none; border-radius: 18px; font-weight: 700; margin-top: 15px; cursor: pointer; font-size: 15px; box-shadow: 0 8px 20px rgba(255, 133, 165, 0.25); }

        /* --- 診斷報告 Modal：乾淨專業風格 --- */
        .report-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #FFF; z-index: 1000; display: none; overflow-y: auto; padding: 30px 20px; }
        #report-capture-area { padding: 35px 25px; background: #FFF; border-radius: 30px; border: 1px solid #F1F1F1; box-shadow: 0 20px 50px rgba(0,0,0,0.04); }
        .report-header { text-align: center; margin-bottom: 30px; }
        .report-header h2 { color: #FF85A5; font-size: 22px; margin-bottom: 5px; }
        .report-header p { font-size: 12px; color: #BDC3C7; }
        
        .report-item { background: #FCFCFC; padding: 20px; border-radius: 20px; margin-bottom: 15px; border: 1px solid #F8F9FA; }
        .report-label { color: #FF85A5; font-size: 11px; font-weight: 700; margin-bottom: 10px; display: block; text-transform: uppercase; letter-spacing: 1px; }
        
        .skin-analysis { display: flex; align-items: center; gap: 20px; }
        .skin-swatch { width: 80px; height: 80px; border-radius: 25px; border: 4px solid #FFF; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }

        .radar-box { width: 100%; height: 250px; }

        .actions { display: flex; gap: 15px; margin-top: 30px; }
        .save-btn { flex: 2; padding: 18px; background: #4FC19F; color: #FFF; border: none; border-radius: 20px; font-weight: 700; font-size: 15px; cursor: pointer; }
        .close-btn { flex: 1; padding: 18px; background: #F8F9FA; color: #999; border: none; border-radius: 20px; font-weight: 700; cursor: pointer; }

        /* 載入中遮罩 */
        .loading-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #FFF; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid #F1F1F1; border-top: 4px solid #FF85A5; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="app">
    <div id="loading" class="loading-screen">
        <div class="spinner"></div>
        <p style="color: #FF85A5; font-size: 15px; font-weight: 600; margin-top: 20px;">正在為您開啟美學空間...</p>
    </div>

    <div class="header">形象美學・AI 私教引導系統</div>

    <div class="camera-container">
        <video id="video" autoplay muted playsinline></video>
        <canvas id="canvas"></canvas>
        
        <div class="proportion-overlay">
            三庭：<span id="data-3courts">-- : -- : --</span><br>
            五眼：<span id="data-5eyes">1 : 1.1 : 1 : 1.1 : 1</span>
        </div>
    </div>

    <div class="lesson-panel">
        <div class="section-title">風格動態指引風格</div>
        <div class="style-group">
            <button class="style-btn active" onclick="switchStyle('natural', this)">法式慵懶</button>
            <button class="style-btn" onclick="switchStyle('classic', this)">職場俐落</button>
            <button class="style-btn" onclick="switchStyle('romantic', this)">蜜桃約會</button>
            <button class="style-btn" onclick="switchStyle('dramatic', this)">高冷女王</button>
            <button class="style-btn" onclick="switchStyle('gamine', this)">元氣精靈</button>
            <button class="style-btn" onclick="switchStyle('ingenue', this)">清純少女</button>
        </div>

        <div id="step-container"></div>
        
        <button class="report-trigger" onclick="openReport()">📋 獲取我的形象分析報告</button>
    </div>
</div>

<div id="report-modal" class="report-modal">
    <div id="report-capture-area">
        <div class="report-header">
            <h2>形象分析診斷書</h2>
            <p>ID: <span id="report-id">2WG-9921</span> | 專業顧問：翊甄</p>
        </div>

        <div class="report-item">
            <span class="report-label">臉型比例測量數據</span>
            <div id="report-face-text" style="font-size:14px; line-height:1.7; color:#666;"></div>
        </div>

        <div class="report-item">
            <span class="report-label">膚色採樣與基調判斷</span>
            <div class="skin-analysis">
                <div id="report-skin-swatch" class="skin-swatch"></div>
                <div id="report-skin-text" style="font-size:13px; color:#7F8C8D; line-height:1.6;"></div>
            </div>
        </div>

        <div class="report-item">
            <span class="report-label">皮膚健康雷達圖分析</span>
            <div class="radar-box"><canvas id="radarChart"></canvas></div>
        </div>

        <div class="report-item" style="border: 2px solid #FFEDF1;">
            <span class="report-label">專業化妝導引建議</span>
            <div id="report-advice" style="font-size:13px; color:#FF85A5; line-height:1.6; font-weight: 500;"></div>
        </div>
        
        <p style="text-align:center; font-size:11px; color:#BDC3C7; margin-top: 20px;">由翊甄 AI 形象顧問系統提供</p>
    </div>

    <div class="actions">
        <button class="save-btn" onclick="saveReport()">💾 下載圖片報告</button>
        <button class="close-btn" onclick="document.getElementById('report-modal').style.display='none'">返回</button>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let faceLandmarker, isReady = false;
    let currentStyle = 'natural', currentStep = 0;
    let lastData = { ratioText: "1:1:1", skinRGB: "rgb(255,255,255)", faceShape: "橢圓臉" };

    const styleData = {
        natural: { name: "法式慵懶", steps: ["野生眉定位導引", "淨透潤色打底", "玫瑰奶茶唇彩"], advice: "您的中庭比例較為標準。建議將腮紅位置稍微往上移動，配合法式風格的呼吸感底妝。" },
        classic: { name: "職場俐落", steps: ["俐落一字眉定位", "微霧持久底妝", "成熟茶棕唇彩"], advice: "強調下顎線的清晰度，適合俐落的眉峰。您的臉型可以加強局部修容。" },
        romantic: { name: "蜜桃約會", steps: ["溫柔彎眉定位", "澎潤蘋果肌打亮", "水感蜜桃唇彩"], advice: "建議在鼻尖與眼頭增加微光點綴。您的五眼比例適合向內暈染腮紅。" },
        dramatic: { name: "高冷女王", steps: ["挑高氣場眉定位", "深邃骨相修容", "飽和酒紅唇彩"], advice: "臉型輪廓分明，可以加強 Step 2 的陰影定位點，製造更深邃的視覺感。" },
        gamine: { name: "元氣精靈", steps: ["俏皮短眉定位", "眼下腮紅提亮", "橘紅透明唇彩"], advice: "縮短中庭的視覺，腮紅請對齊鼻翼上緣。您的比例非常適合這種元氣感。" },
        ingenue: { name: "清純少女", steps: ["原生淺色眉定位", "水潤偽素顏底妝", "粉嫩玻璃唇彩"], advice: "強調自然光澤，減少線條感。您的皮膚基調非常適合淺粉色系。" }
    };

    // 1. 初始化 AI 核心 (修正 WASM 報錯邏輯)
    async function initAI() {
        try {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
            faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                baseOptions: { 
                    modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task`,
                    delegate: "GPU" 
                },
                outputFaceBlendshapes: true, runningMode: "VIDEO", numFaces: 1
            });
            startCamera();
        } catch (e) {
            alert("相機初始化失敗，請確保使用 Safari 或 Chrome。");
        }
    }

    async function startCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        video.srcObject = stream;
        video.onloadeddata = () => {
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            isReady = true;
            document.getElementById('loading').style.display = 'none';
            renderSteps();
            predict();
        };
    }

    // 2. 預測迴圈 (478點微光面網)
    async function predict() {
        if (!isReady) return;
        const results = faceLandmarker.detectForVideo(video, performance.now());
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (results.faceLandmarks && results.faceLandmarks.length > 0) {
            const m = results.faceLandmarks[0];
            const drawingUtils = new DrawingUtils(ctx);
            
            // 視覺優化：淡紫色微光網格 (清新版)
            drawingUtils.drawConnectors(m, FaceLandmarker.FACE_LANDMARKS_TESSELATION, { color: "rgba(255, 133, 165, 0.2)", lineWidth: 0.3 });
            drawingUtils.drawConnectors(m, FaceLandmarker.FACE_LANDMARKS_RIGHT_EYE, { color: "#FF85A5", lineWidth: 1 });
            drawingUtils.drawConnectors(m, FaceLandmarker.FACE_LANDMARKS_LEFT_EYE, { color: "#FF85A5", lineWidth: 1 });

            updateProportions(m);
            sampleSkinColor(m[3]);
            drawARGuide(m);
        }
        requestAnimationFrame(predict);
    }

    function updateProportions(m) {
        const t=m[10], mid=m[168], nose=m[1], chin=m[152];
        const d1=Math.abs(mid.y-t.y), d2=Math.abs(nose.y-mid.y), d3=Math.abs(chin.y-nose.y);
        const sum=d1+d2+d3;
        lastData.ratioText = `${(d1/sum*3).toFixed(1)} : ${(d2/sum*3).toFixed(1)} : ${(d3/sum*3).toFixed(1)}`;
        document.getElementById('data-3courts').innerText = lastData.ratioText;
    }

    function sampleSkinColor(pt) {
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width=1; tempCanvas.height=1;
        const tCtx = tempCanvas.getContext('2d');
        tCtx.drawImage(video, pt.x*video.videoWidth, pt.y*video.videoHeight, 1, 1, 0, 0, 1, 1);
        const p = tCtx.getImageData(0,0,1,1).data;
        lastData.skinRGB = `rgb(${p[0]},${p[1]},${p[2]})`;
    }

    function drawARGuide(m) {
        ctx.setLineDash([5, 5]); ctx.lineWidth = 2; ctx.strokeStyle = "#FF85A5";
        if(currentStep === 0) { // 眉毛
            const eye = m[33];
            ctx.beginPath(); ctx.moveTo(eye.x*canvas.width, eye.y*canvas.height);
            ctx.lineTo((eye.x-0.08)*canvas.width, (eye.y-0.06)*canvas.height); ctx.stroke();
        } else if (currentStep === 2) { // 唇部
            const mouth = m[13];
            ctx.setLineDash([]); ctx.beginPath();
            ctx.arc(mouth.x*canvas.width, mouth.y*canvas.height, 12, 0, Math.PI*2); ctx.stroke();
        }
    }

    // 3. 診斷報告生成
    function openReport() {
        document.getElementById('report-modal').style.display = 'block';
        document.getElementById('report-face-text').innerHTML = `AI 分析顯示您的三庭比例為 <b>${lastData.ratioText}</b>。比例均勻，非常適合橫向與縱向混合暈染的妝法。`;
        document.getElementById('report-skin-swatch').style.background = lastData.skinRGB;
        document.getElementById('report-skin-text').innerHTML = `基調採樣：${lastData.skinRGB}<br>2WG ID：Soft-Pink 02<br>建議選用具備透明感的珊瑚色與裸粉色。`;
        document.getElementById('report-advice').innerText = styleData[currentStyle].advice;
        
        setTimeout(() => {
            new Chart(document.getElementById('radarChart'), {
                type: 'radar',
                data: {
                    labels: ['細膩度', '色均度', '緊緻度', '肌齡', '水分感'],
                    datasets: [{
                        label: '數據分析',
                        data: [82, 75, 88, 60, 78],
                        backgroundColor: 'rgba(255, 133, 165, 0.1)',
                        borderColor: '#FF85A5',
                        borderWidth: 2,
                        pointBackgroundColor: '#FF85A5'
                    }]
                },
                options: {
                    scales: { r: { grid: { color: '#F1F1F1' }, ticks: { display: false }, angleLines: { color: '#F1F1F1' }, pointLabels: { color: '#999', font: { size: 11 } } } },
                    plugins: { legend: { display: false } }
                }
            });
        }, 300);
    }

    function saveReport() {
        const area = document.getElementById('report-capture-area');
        html2canvas(area, { scale: 2, backgroundColor: "#ffffff" }).then(canvas => {
            const link = document.createElement('a');
            link.download = `我的美學診斷報告_${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        });
    }

    function switchStyle(key, btn) {
        currentStyle = key; currentStep = 0;
        document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active'); renderSteps();
    }
    function renderSteps() {
        const container = document.getElementById('step-container');
        container.innerHTML = styleData[currentStyle].steps.map((s, i) => `
            <div class="step-card ${i === currentStep ? 'active' : ''}" onclick="currentStep=${i};renderSteps()">
                <img class="step-thumb" src="https://via.placeholder.com/50/FFEDF1/FF85A5?text=%E5%B0%8E%E5%B8%AB" alt="導引圖">
                <div class="step-text">${i+1}. ${s}</div>
            </div>
        `).join('');
    }

    window.onload = initAI;
</script>

</body>
</html>
